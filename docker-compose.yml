version: '3.8'

services:
  iobroker:
    # ----------------------------------------------------
    # Option A: Standalone mode (Bundles adapter into image)
    # ----------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile

    # ----------------------------------------------------
    # Option B: Development mode (Uncomment below to mount local code directly)
    # ----------------------------------------------------
    # image: buanet/iobroker:latest
    # volumes:
    #   - iobroker-data:/opt/iobroker
    #   - .:/opt/iobroker/node_modules/iobroker.ecovacs-deebot
    #   - ./.docker/userscripts/userscript_firststart.sh:/opt/userscripts/userscript_firststart.sh

    container_name: iobroker-ecovacs
    hostname: iobroker-ecovacs
    restart: always
    ports:
      - "8081:8081" # ioBroker Admin Web Interface
    volumes:
      - iobroker-data:/opt/iobroker
      - ../ecovacs-deebot.js:/opt/ecovacs-deebot.js # the library, where file:../ resolves
      - .:/opt/iobroker.ecovacs-deebot # the adapter source
    environment:
      - TZ=Europe/Berlin
      - IOB_ADMINPORT=8081
      # Optional: Auto-configure Ecovacs Deebot adapter on first start (loaded from .env file)
      - ECOVACS_EMAIL=${ECOVACS_EMAIL:-}
      - ECOVACS_PASSWORD=${ECOVACS_PASSWORD:-}
      - ECOVACS_COUNTRY=${ECOVACS_COUNTRY:-}

volumes:
  iobroker-data:
